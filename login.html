<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UseNohl - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--body-color);
            margin: 0;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .login-container {
            background: var(--sidebar-color);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--toggle-color);
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 80px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: var(--text-color);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 16px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: var(--text-color);
            opacity: 0.5;
            font-size: 20px;
            transition: var(--tran-03);
        }

        .input-group input {
            width: 100%;
            padding: 15px 45px;
            background: var(--primary-color-light);
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            color: var(--text-color);
            transition: var(--tran-03);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(105, 92, 254, 0.1);
            background: var(--sidebar-color);
        }

        .input-group:focus-within i {
            color: var(--primary-color);
            opacity: 1;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-color);
            font-size: 14px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 30px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 18px;
            width: 18px;
            background-color: var(--primary-color-light);
            border: 2px solid var(--toggle-color);
            border-radius: 4px;
        }

        .checkbox-container:hover input~.checkmark {
            background-color: var(--toggle-color);
        }

        .checkbox-container input:checked~.checkmark {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked~.checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-forgot a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--tran-03);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--text-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(105, 92, 254, 0.3);
        }

        .register-link {
            text-align: center;
            color: var(--text-color);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--toggle-color);
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .logo-login {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-login img {
            max-width: 150px;
            height: auto;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .remember-forgot {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="logo-login">
            <img src="logo.png" alt="UseNohl" style="max-width: 120px;">
        </div>

        <div class="login-container">
            <div class="login-header">
                <i class='bx bx-user-circle'></i>
                <h2>Bem-vindo de volta!</h2>
                <p>Faça login para continuar</p>
            </div>

            <form id="login-form" class="login-form"
                onsubmit="event.preventDefault(); fazerLogin(document.getElementById('email').value, document.getElementById('password').value)">
                <div class="input-group">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>

                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-container">
                        <input type="checkbox" id="manter-logado" class="manter-logado-checkbox">
                        <span class="checkmark"></span>
                        Permanecer logado
                    </label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn">ENTRAR</button>

                <div class="register-link">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
